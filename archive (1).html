<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Archive</title>
<style>
@font-face {
  font-family: 'HsGultokki';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2210-2@1.0/HSGooltokki.woff2') format('woff2');
  font-weight: normal;
  font-display: swap;
}
@font-face {
  font-family: "Maison Neue Mono";
  src: url("https://db.onlinewebfonts.com/t/63467b9cbd4a4d7eafb5e64946ecaa18.woff2") format("woff2"),
       url("https://db.onlinewebfonts.com/t/63467b9cbd4a4d7eafb5e64946ecaa18.woff") format("woff");
  font-display: swap;
}

:root {
  --bg: #1B223D;
  --white: #FFFEFC;
  --white-dim: rgba(255,254,252,0.4);
  --white-faint: rgba(255,254,252,0.07);
  --border: rgba(255,254,252,0.11);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--white);
  font-family: "Maison Neue Mono", monospace;
  min-height: 100vh;
  cursor: none;
  overflow-x: hidden;
}

#cursor {
  position: fixed;
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--white);
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width 0.22s ease, height 0.22s ease, opacity 0.2s;
  mix-blend-mode: difference;
}
#cursor.hover { width: 52px; height: 52px; opacity: 0.5; }

header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 400;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 26px 44px;
}

.logo {
  font-family: 'HsGultokki', sans-serif;
  font-size: 2.1rem;
  letter-spacing: -0.01em;
  color: var(--white);
  text-decoration: none;
  line-height: 1;
  mix-blend-mode: difference;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 24px;
}

.item-count {
  font-size: 0.57rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--white-dim);
}

#fileInput { display: none; }

.upload-btn {
  font-family: "Maison Neue Mono", monospace;
  font-size: 0.57rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--white);
  background: var(--white-faint);
  border: 1px solid var(--border);
  padding: 9px 20px;
  cursor: none;
  transition: background 0.2s, border-color 0.2s;
  position: relative;
}
.upload-btn:hover {
  background: rgba(255,254,252,0.13);
  border-color: rgba(255,254,252,0.28);
}
.upload-btn.loading { opacity: 0.5; pointer-events: none; }

/* upload progress bar inside button */
.upload-btn .progress-bar {
  position: absolute;
  bottom: 0; left: 0;
  height: 2px;
  background: var(--white);
  width: 0%;
  transition: width 0.2s;
}

#masonry {
  padding: 116px 44px 100px;
  columns: 4 260px;
  column-gap: 8px;
}

.item {
  break-inside: avoid;
  margin-bottom: 8px;
  position: relative;
  overflow: hidden;
  cursor: none;
  opacity: 0;
  transform: translateY(24px);
  animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}

.item img {
  display: block;
  width: 100%;
  height: auto;
  transition: transform 0.75s cubic-bezier(0.16, 1, 0.3, 1);
}
.item:hover img { transform: scale(1.06); }

.item-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(27,34,61,0.88) 0%, rgba(27,34,61,0.2) 40%, transparent 70%);
  opacity: 0;
  transition: opacity 0.35s;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 16px 14px;
}
.item:hover .item-overlay { opacity: 1; }

.item-num {
  font-size: 0.48rem;
  letter-spacing: 0.18em;
  color: var(--white-dim);
  margin-bottom: 3px;
}
.item-name {
  font-family: 'HsGultokki', sans-serif;
  font-size: 0.95rem;
  line-height: 1.2;
  color: var(--white);
}

/* delete button on hover */
.item-delete {
  position: absolute;
  top: 10px; right: 10px;
  background: rgba(27,34,61,0.75);
  border: 1px solid var(--border);
  color: var(--white-dim);
  font-family: "Maison Neue Mono", monospace;
  font-size: 0.5rem;
  letter-spacing: 0.1em;
  padding: 5px 9px;
  cursor: none;
  opacity: 0;
  transition: opacity 0.2s, color 0.15s;
}
.item:hover .item-delete { opacity: 1; }
.item-delete:hover { color: var(--white); }

/* ── LIGHTBOX ── */
#lb {
  position: fixed;
  inset: 0;
  z-index: 600;
  background: rgba(10, 13, 26, 0.97);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.28s;
}
#lb.open { opacity: 1; pointer-events: all; }

#lb-img {
  max-width: 84vw;
  max-height: 84vh;
  object-fit: contain;
  display: block;
  opacity: 0;
  transform: scale(0.96);
  transition: opacity 0.35s, transform 0.45s cubic-bezier(0.16, 1, 0.3, 1);
}
#lb-img.loaded { opacity: 1; transform: scale(1); }

#lb-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 18px 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid var(--border);
  background: rgba(27,34,61,0.65);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}

#lb-info { display: flex; flex-direction: column; gap: 3px; }
#lb-counter { font-size: 0.5rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--white-dim); }
#lb-name { font-family: 'HsGultokki', sans-serif; font-size: 1.4rem; color: var(--white); }

.lb-btns { display: flex; gap: 8px; }
.lb-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--white);
  font-family: "Maison Neue Mono", monospace;
  font-size: 0.52rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 8px 18px;
  cursor: none;
  transition: background 0.15s, border-color 0.15s;
}
.lb-btn:hover { background: var(--white-faint); border-color: rgba(255,254,252,0.28); }

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 90px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: rgba(255,254,252,0.1);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  color: var(--white);
  font-size: 0.58rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 10px 22px;
  opacity: 0;
  transition: opacity 0.25s, transform 0.25s;
  pointer-events: none;
  z-index: 700;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── DRAG OVERLAY ── */
#drag-ov {
  position: fixed;
  inset: 0;
  z-index: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  background: rgba(27,34,61,0.94);
  border: 1.5px dashed rgba(255,254,252,0.35);
  margin: 20px;
  border-radius: 2px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s;
}
#drag-ov.on { opacity: 1; }
#drag-ov .d-title {
  font-family: 'HsGultokki', sans-serif;
  font-size: clamp(2.5rem, 7vw, 6rem);
  color: var(--white);
  line-height: 1;
}
#drag-ov .d-sub {
  font-size: 0.58rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--white-dim);
}

/* ── EMPTY ── */
#empty {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  pointer-events: none;
}
.e-title {
  font-family: 'HsGultokki', sans-serif;
  font-size: clamp(4rem, 14vw, 11rem);
  color: rgba(255,254,252,0.04);
  line-height: 1;
  user-select: none;
}
.e-sub {
  font-size: 0.56rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(255,254,252,0.25);
}

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); }

@media (max-width: 680px) {
  header { padding: 18px 20px; }
  .logo { font-size: 1.5rem; }
  #masonry { columns: 2 140px; padding: 88px 14px 80px; column-gap: 5px; }
  .item { margin-bottom: 5px; }
  #lb-bar { padding: 14px 20px; }
  #lb-name { font-size: 1rem; }
  #lb-img { max-width: 96vw; max-height: 78vh; }
}
</style>
</head>
<body>

<div id="cursor"></div>

<header>
  <a class="logo" href="#">Archive</a>
  <div class="header-right">
    <span class="item-count" id="itemCount">loading…</span>
    <input type="file" id="fileInput" accept="image/*" multiple />
    <button class="upload-btn" id="uploadBtn">
      + Add
      <div class="progress-bar" id="progressBar"></div>
    </button>
  </div>
</header>

<div id="masonry"></div>

<div id="empty">
  <div class="e-title">Archive</div>
  <div class="e-sub">Drop or upload images to begin</div>
</div>

<div id="lb">
  <img id="lb-img" src="" alt="" />
  <div id="lb-bar">
    <div id="lb-info">
      <span id="lb-counter"></span>
      <span id="lb-name"></span>
    </div>
    <div class="lb-btns">
      <button class="lb-btn" id="lbPrev">← Prev</button>
      <button class="lb-btn" id="lbNext">Next →</button>
      <button class="lb-btn" id="lbClose">✕</button>
    </div>
  </div>
</div>

<div id="drag-ov">
  <div class="d-title">Drop Here</div>
  <div class="d-sub">Add to archive</div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── CONFIG ─────────────────────────────────────────────────
const SUPABASE_URL = 'https://uwcuwlrtylormyhjcyvo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3Y3V3bHJ0eWxvcm15aGpjeXZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NjkxODAsImV4cCI6MjA4NzU0NTE4MH0.CxFrr2F2Z3-djkaWdCTDrPJAD6YHV1FSsu3ouBpdrFY';
const BUCKET = 'archive';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── CURSOR ─────────────────────────────────────────────────
const cur = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
});
document.addEventListener('mouseover', e => {
  cur.classList.toggle('hover', !!e.target.closest('button, a, .item'));
});

// ── STATE ──────────────────────────────────────────────────
let items = []; // { name, url, title }
let lbIdx = 0;

const masonry   = document.getElementById('masonry');
const emptyEl   = document.getElementById('empty');
const itemCount = document.getElementById('itemCount');
const lb        = document.getElementById('lb');
const lbImg     = document.getElementById('lb-img');
const lbName    = document.getElementById('lb-name');
const lbCounter = document.getElementById('lb-counter');
const dragOv    = document.getElementById('drag-ov');
const progressBar = document.getElementById('progressBar');

// ── TOAST ──────────────────────────────────────────────────
function toast(msg, duration = 2400) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ── LOAD FROM SUPABASE ─────────────────────────────────────
async function loadImages() {
  itemCount.textContent = 'loading…';
  try {
    const { data, error } = await db.storage.from(BUCKET).list('', {
      limit: 500,
      sortBy: { column: 'created_at', order: 'desc' }
    });
    if (error) throw error;

    // filter to image files only
    const imageFiles = (data || []).filter(f =>
      f.name && /\.(jpe?g|png|gif|webp|avif|svg)$/i.test(f.name)
    );

    items = imageFiles.map(f => {
      const { data: urlData } = db.storage.from(BUCKET).getPublicUrl(f.name);
      return {
        name: f.name,
        url: urlData.publicUrl,
        title: f.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ')
      };
    });

    buildGrid();
  } catch (e) {
    console.error('Load error:', e);
    itemCount.textContent = 'error loading';
    toast('Failed to load images');
  }
}

// ── RENDER ─────────────────────────────────────────────────
function updateMeta() {
  itemCount.textContent = `${items.length} item${items.length !== 1 ? 's' : ''}`;
  emptyEl.style.display = items.length === 0 ? 'flex' : 'none';
}

function buildGrid() {
  masonry.innerHTML = '';
  items.forEach((item, i) => addCard(item, i));
  updateMeta();
}

function addCard(item, idx) {
  const el = document.createElement('div');
  el.className = 'item';
  el.style.animationDelay = `${(idx % 15) * 48}ms`;

  const img = document.createElement('img');
  img.src = item.url;
  img.alt = item.title;
  img.loading = 'lazy';

  const ov = document.createElement('div');
  ov.className = 'item-overlay';
  ov.innerHTML = `
    <div class="item-num">№ ${String(idx + 1).padStart(3,'0')}</div>
    <div class="item-name">${item.title}</div>
  `;

  const delBtn = document.createElement('button');
  delBtn.className = 'item-delete';
  delBtn.textContent = '✕ remove';
  delBtn.addEventListener('click', e => {
    e.stopPropagation();
    deleteImage(item.name, el);
  });

  el.appendChild(img);
  el.appendChild(ov);
  el.appendChild(delBtn);
  el.addEventListener('click', () => openLb(idx));
  masonry.appendChild(el);
}

// ── UPLOAD ─────────────────────────────────────────────────
document.getElementById('uploadBtn').addEventListener('click', () =>
  document.getElementById('fileInput').click()
);
document.getElementById('fileInput').addEventListener('change', e => {
  handleFiles(Array.from(e.target.files));
  e.target.value = '';
});

async function handleFiles(files) {
  const imageFiles = files.filter(f => f.type.startsWith('image/'));
  if (!imageFiles.length) return;

  const btn = document.getElementById('uploadBtn');
  btn.classList.add('loading');
  btn.childNodes[0].textContent = `uploading…`;

  let done = 0;
  for (const file of imageFiles) {
    // unique filename: timestamp + original name
    const ext = file.name.split('.').pop();
    const base = file.name.replace(/\.[^.]+$/, '').replace(/[^a-zA-Z0-9]/g, '_');
    const filename = `${Date.now()}_${base}.${ext}`;

    const { error } = await db.storage.from(BUCKET).upload(filename, file, {
      cacheControl: '3600',
      upsert: false,
      contentType: file.type
    });

    if (error) {
      console.error('Upload error:', error);
      toast(`Failed: ${file.name}`);
    } else {
      done++;
    }

    progressBar.style.width = `${(done / imageFiles.length) * 100}%`;
  }

  progressBar.style.width = '0%';
  btn.classList.remove('loading');
  btn.childNodes[0].textContent = '+ Add';

  if (done > 0) {
    toast(`${done} image${done !== 1 ? 's' : ''} added`);
    await loadImages(); // reload from Supabase to get correct order
  }
}

// ── DELETE ──────────────────────────────────────────────────
async function deleteImage(name, el) {
  if (!confirm(`Remove "${name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ')}" from the archive?`)) return;

  const { error } = await db.storage.from(BUCKET).remove([name]);
  if (error) {
    toast('Could not remove image');
    return;
  }

  el.style.transition = 'opacity 0.3s';
  el.style.opacity = '0';
  setTimeout(() => {
    el.remove();
    items = items.filter(i => i.name !== name);
    updateMeta();
    toast('Removed');
  }, 300);
}

// ── LIGHTBOX ───────────────────────────────────────────────
function openLb(idx) {
  lbIdx = idx;
  showLbItem();
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function showLbItem() {
  const item = items[lbIdx];
  if (!item) return;
  lbImg.classList.remove('loaded');
  lbImg.src = '';
  setTimeout(() => {
    lbImg.src = item.url;
    lbImg.onload = () => lbImg.classList.add('loaded');
  }, 20);
  lbName.textContent = item.title;
  lbCounter.textContent = `№ ${String(lbIdx + 1).padStart(3,'0')} / ${items.length}`;
}

function closeLb() {
  lb.classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('lbClose').addEventListener('click', closeLb);
document.getElementById('lbPrev').addEventListener('click', () => {
  lbIdx = (lbIdx - 1 + items.length) % items.length;
  showLbItem();
});
document.getElementById('lbNext').addEventListener('click', () => {
  lbIdx = (lbIdx + 1) % items.length;
  showLbItem();
});
lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });

document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape')     closeLb();
  if (e.key === 'ArrowRight') { lbIdx = (lbIdx + 1) % items.length; showLbItem(); }
  if (e.key === 'ArrowLeft')  { lbIdx = (lbIdx - 1 + items.length) % items.length; showLbItem(); }
});

// ── DRAG & DROP ─────────────────────────────────────────────
let dc = 0;
document.addEventListener('dragenter', e => { e.preventDefault(); dc++; dragOv.classList.add('on'); });
document.addEventListener('dragleave', () => { dc--; if (dc <= 0) { dc = 0; dragOv.classList.remove('on'); } });
document.addEventListener('dragover',  e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  dc = 0;
  dragOv.classList.remove('on');
  handleFiles(Array.from(e.dataTransfer.files));
});

// ── INIT ────────────────────────────────────────────────────
loadImages();
</script>
</body>
</html>
