<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Archive</title>
<style>
@font-face {
  font-family: 'HsGultokki';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2210-2@1.0/HSGooltokki.woff2') format('woff2');
  font-weight: normal;
  font-display: swap;
}
@font-face {
  font-family: "Maison Neue Mono";
  src: url("https://db.onlinewebfonts.com/t/63467b9cbd4a4d7eafb5e64946ecaa18.woff2") format("woff2"),
       url("https://db.onlinewebfonts.com/t/63467b9cbd4a4d7eafb5e64946ecaa18.woff") format("woff");
  font-display: swap;
}

:root {
  --bg: #1B223D;
  --white: #FFFEFC;
  --white-dim: rgba(255,254,252,0.4);
  --white-faint: rgba(255,254,252,0.07);
  --border: rgba(255,254,252,0.11);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--white);
  font-family: "Maison Neue Mono", monospace;
  min-height: 100vh;
  cursor: none;
  overflow-x: hidden;
}

/* ── CURSOR ── */
#cursor {
  position: fixed;
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--white);
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width 0.22s ease, height 0.22s ease, opacity 0.2s;
  mix-blend-mode: difference;
  will-change: left, top;
}
#cursor.hover {
  width: 52px; height: 52px;
  opacity: 0.5;
}

/* ── HEADER ── */
header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 400;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 26px 44px;
}

.logo {
  font-family: 'HsGultokki', sans-serif;
  font-size: 2.1rem;
  letter-spacing: -0.01em;
  color: var(--white);
  text-decoration: none;
  line-height: 1;
  mix-blend-mode: difference;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 24px;
}

.item-count {
  font-size: 0.57rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--white-dim);
}

#fileInput { display: none; }

.upload-btn {
  font-family: "Maison Neue Mono", monospace;
  font-size: 0.57rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--white);
  background: var(--white-faint);
  border: 1px solid var(--border);
  padding: 9px 20px;
  cursor: none;
  transition: background 0.2s, border-color 0.2s;
}
.upload-btn:hover {
  background: rgba(255,254,252,0.13);
  border-color: rgba(255,254,252,0.28);
}

/* ── MASONRY ── */
#masonry {
  padding: 116px 44px 100px;
  columns: 4 260px;
  column-gap: 8px;
}

/* ── ITEM ── */
.item {
  break-inside: avoid;
  margin-bottom: 8px;
  position: relative;
  overflow: hidden;
  cursor: none;
  opacity: 0;
  transform: translateY(24px);
  animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}

.item img {
  display: block;
  width: 100%;
  height: auto;
  transition: transform 0.75s cubic-bezier(0.16, 1, 0.3, 1);
}
.item:hover img { transform: scale(1.06); }

.item-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top,
    rgba(27,34,61,0.88) 0%,
    rgba(27,34,61,0.2) 40%,
    transparent 70%);
  opacity: 0;
  transition: opacity 0.35s;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 16px 14px;
}
.item:hover .item-overlay { opacity: 1; }

.item-num {
  font-size: 0.48rem;
  letter-spacing: 0.18em;
  color: var(--white-dim);
  margin-bottom: 3px;
}
.item-name {
  font-family: 'HsGultokki', sans-serif;
  font-size: 0.95rem;
  line-height: 1.2;
  color: var(--white);
}

/* ── LIGHTBOX ── */
#lb {
  position: fixed;
  inset: 0;
  z-index: 600;
  background: rgba(10, 13, 26, 0.97);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.28s;
}
#lb.open {
  opacity: 1;
  pointer-events: all;
}

#lb-img {
  max-width: 84vw;
  max-height: 84vh;
  object-fit: contain;
  display: block;
  opacity: 0;
  transform: scale(0.96);
  transition: opacity 0.35s, transform 0.45s cubic-bezier(0.16, 1, 0.3, 1);
}
#lb-img.loaded {
  opacity: 1;
  transform: scale(1);
}

/* lb bottom bar */
#lb-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 18px 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid var(--border);
  background: rgba(27,34,61,0.65);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}

#lb-info { display: flex; flex-direction: column; gap: 3px; }
#lb-counter {
  font-size: 0.5rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--white-dim);
}
#lb-name {
  font-family: 'HsGultokki', sans-serif;
  font-size: 1.4rem;
  color: var(--white);
}

.lb-btns { display: flex; gap: 8px; }
.lb-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--white);
  font-family: "Maison Neue Mono", monospace;
  font-size: 0.52rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 8px 18px;
  cursor: none;
  transition: background 0.15s, border-color 0.15s;
}
.lb-btn:hover {
  background: var(--white-faint);
  border-color: rgba(255,254,252,0.28);
}

/* ── DRAG OVERLAY ── */
#drag-ov {
  position: fixed;
  inset: 0;
  z-index: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  background: rgba(27,34,61,0.94);
  border: 1.5px dashed rgba(255,254,252,0.35);
  margin: 20px;
  border-radius: 2px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s;
}
#drag-ov.on { opacity: 1; }
#drag-ov .d-title {
  font-family: 'HsGultokki', sans-serif;
  font-size: clamp(2.5rem, 7vw, 6rem);
  color: var(--white);
  line-height: 1;
}
#drag-ov .d-sub {
  font-size: 0.58rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--white-dim);
}

/* ── EMPTY ── */
#empty {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  pointer-events: none;
}
.e-title {
  font-family: 'HsGultokki', sans-serif;
  font-size: clamp(4rem, 14vw, 11rem);
  color: rgba(255,254,252,0.04);
  line-height: 1;
  user-select: none;
}
.e-sub {
  font-size: 0.56rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(255,254,252,0.25);
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); }

@media (max-width: 680px) {
  header { padding: 18px 20px; }
  .logo { font-size: 1.5rem; }
  #masonry { columns: 2 140px; padding: 88px 14px 80px; column-gap: 5px; }
  .item { margin-bottom: 5px; }
  #lb-bar { padding: 14px 20px; }
  #lb-name { font-size: 1rem; }
  #lb-img { max-width: 96vw; max-height: 78vh; }
}
</style>
</head>
<body>

<div id="cursor"></div>

<header>
  <a class="logo" href="#">Archive</a>
  <div class="header-right">
    <span class="item-count" id="itemCount">— items</span>
    <input type="file" id="fileInput" accept="image/*" multiple />
    <button class="upload-btn" id="uploadBtn">+ Add</button>
  </div>
</header>

<div id="masonry"></div>

<div id="empty">
  <div class="e-title">Archive</div>
  <div class="e-sub">Drop or upload images to begin</div>
</div>

<!-- LIGHTBOX -->
<div id="lb">
  <img id="lb-img" src="" alt="" />
  <div id="lb-bar">
    <div id="lb-info">
      <span id="lb-counter"></span>
      <span id="lb-name"></span>
    </div>
    <div class="lb-btns">
      <button class="lb-btn" id="lbPrev">← Prev</button>
      <button class="lb-btn" id="lbNext">Next →</button>
      <button class="lb-btn" id="lbClose">✕</button>
    </div>
  </div>
</div>

<!-- DRAG OVERLAY -->
<div id="drag-ov">
  <div class="d-title">Drop Here</div>
  <div class="d-sub">Add to archive</div>
</div>

<script>
// ── CURSOR ─────────────────────────────────────────
const cur = document.getElementById('cursor');
let mx = -100, my = -100;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cur.style.left = mx + 'px';
  cur.style.top  = my + 'px';
});
document.addEventListener('mouseover', e => {
  cur.classList.toggle('hover', !!e.target.closest('button, a, .item'));
});

// ── STATE ──────────────────────────────────────────
let items = [];
let lbIdx = 0;

const masonry   = document.getElementById('masonry');
const emptyEl   = document.getElementById('empty');
const itemCount = document.getElementById('itemCount');
const lb        = document.getElementById('lb');
const lbImg     = document.getElementById('lb-img');
const lbName    = document.getElementById('lb-name');
const lbCounter = document.getElementById('lb-counter');
const dragOv    = document.getElementById('drag-ov');

// ── SEED DATA ──────────────────────────────────────
const seeds = [
  { src: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1000&q=80' },
  { src: 'https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=1000&q=80', title: 'City Grid' },
  { src: 'https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=800&q=80',  title: 'Still Light' },
  { src: 'https://images.unsplash.com/photo-1541701494587-cb58502866ab?w=900&q=80',  title: 'Paint Study' },
  { src: 'https://images.unsplash.com/photo-1511818966892-d7d671e672a2?w=1000&q=80', title: 'Arch & Shadow' },
  { src: 'https://images.unsplash.com/photo-1448375240586-882707db888b?w=900&q=80',  title: 'Forest Floor' },
  { src: 'https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?w=1000&q=80', title: 'Wet Street' },
  { src: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1000&q=80', title: 'Dusk Range' },
  { src: 'https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=900&q=80',  title: 'Ocean Haze' },
  { src: 'https://images.unsplash.com/photo-1493246507139-91e8fad9978e?w=900&q=80',  title: 'Valley' },
  { src: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=800&q=80',  title: 'Face' },
  { src: 'https://images.unsplash.com/photo-1519125323398-675f0ddb6308?w=1000&q=80', title: 'Desert Road' },
  { src: 'https://images.unsplash.com/photo-1495616811223-4d98c6e9c869?w=900&q=80',  title: 'Cliff Edge' },
  { src: 'https://images.unsplash.com/photo-1526512340740-9217d0159da9?w=900&q=80',  title: 'Shore' },
  { src: 'https://images.unsplash.com/photo-1494526585095-c41746248156?w=1000&q=80', title: 'Skyline' },
];

// ── RENDER ─────────────────────────────────────────
function updateMeta() {
  itemCount.textContent = `${items.length} item${items.length !== 1 ? 's' : ''}`;
  emptyEl.style.display = items.length === 0 ? 'flex' : 'none';
}

function addCard(item, idx) {
  const el = document.createElement('div');
  el.className = 'item';
  el.style.animationDelay = `${(idx % 15) * 48}ms`;

  const img = document.createElement('img');
  img.src = item.src;
  img.alt = item.title;
  img.loading = 'lazy';

  const ov = document.createElement('div');
  ov.className = 'item-overlay';
  ov.innerHTML = `<div class="item-num">№ ${String(idx + 1).padStart(3,'0')}</div><div class="item-name">${item.title}</div>`;

  el.appendChild(img);
  el.appendChild(ov);
  el.addEventListener('click', () => openLb(idx));
  masonry.appendChild(el);
}

function buildGrid() {
  masonry.innerHTML = '';
  items.forEach((item, i) => addCard(item, i));
  updateMeta();
}

// ── LIGHTBOX ───────────────────────────────────────
function openLb(idx) {
  lbIdx = idx;
  showLbItem();
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function showLbItem() {
  const item = items[lbIdx];
  if (!item) return;
  lbImg.classList.remove('loaded');
  lbImg.src = '';
  setTimeout(() => {
    lbImg.src = item.src;
    lbImg.onload = () => lbImg.classList.add('loaded');
  }, 20);
  lbName.textContent = item.title;
  lbCounter.textContent = `№ ${String(lbIdx + 1).padStart(3,'0')} / ${items.length}`;
}

function closeLb() {
  lb.classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('lbClose').addEventListener('click', closeLb);
document.getElementById('lbPrev').addEventListener('click', () => { lbIdx = (lbIdx - 1 + items.length) % items.length; showLbItem(); });
document.getElementById('lbNext').addEventListener('click', () => { lbIdx = (lbIdx + 1) % items.length; showLbItem(); });
lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });

document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape')      closeLb();
  if (e.key === 'ArrowRight')  { lbIdx = (lbIdx + 1) % items.length; showLbItem(); }
  if (e.key === 'ArrowLeft')   { lbIdx = (lbIdx - 1 + items.length) % items.length; showLbItem(); }
});

// ── UPLOAD ─────────────────────────────────────────
document.getElementById('uploadBtn').addEventListener('click', () => document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', e => {
  handleFiles(Array.from(e.target.files));
  e.target.value = '';
});

function handleFiles(files) {
  files.filter(f => f.type.startsWith('image/')).forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      const idx = items.length;
      const item = {
        src: ev.target.result,
        title: file.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ')
      };
      items.push(item);
      addCard(item, idx);
      updateMeta();
    };
    reader.readAsDataURL(file);
  });
}

// ── DRAG & DROP ────────────────────────────────────
let dc = 0;
document.addEventListener('dragenter', e => { e.preventDefault(); dc++; dragOv.classList.add('on'); });
document.addEventListener('dragleave', () => { dc--; if (dc <= 0) { dc = 0; dragOv.classList.remove('on'); } });
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  dc = 0;
  dragOv.classList.remove('on');
  handleFiles(Array.from(e.dataTransfer.files));
});

// ── INIT ───────────────────────────────────────────
seeds.forEach((s, i) => items.push({ ...s }));
buildGrid();
</script>
</body>
</html>
